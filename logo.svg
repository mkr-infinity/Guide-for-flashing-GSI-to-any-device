<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="layerTop" x1="12" y1="22" x2="52" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="layerMid" x1="12" y1="32" x2="52" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="layerBot" x1="12" y1="42" x2="52" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="27" y1="10" x2="40" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Subtle grid / circuit lines -->
  <line x1="12" y1="8" x2="12" y2="56" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="0.8"/>
  <line x1="32" y1="8" x2="32" y2="56" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="0.8"/>
  <line x1="52" y1="8" x2="52" y2="56" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="0.8"/>
  <line x1="8" y1="20" x2="56" y2="20" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="0.8"/>
  <line x1="8" y1="44" x2="56" y2="44" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="0.8"/>

  <!-- Stacked ROM layers -->
  <rect x="10" y="18" width="44" height="8" rx="3" fill="url(#layerTop)" opacity="0.95" filter="url(#shadow)"/>
  <rect x="10" y="28" width="44" height="8" rx="3" fill="url(#layerMid)" opacity="0.9" filter="url(#shadow)"/>
  <rect x="10" y="38" width="44" height="8" rx="3" fill="url(#layerBot)" opacity="0.85" filter="url(#shadow)"/>

  <!-- Layer dots (partition indicators) -->
  <circle cx="17" cy="22" r="1.8" fill="#065F46" opacity="0.6"/>
  <circle cx="17" cy="32" r="1.8" fill="#065F46" opacity="0.6"/>
  <circle cx="17" cy="42" r="1.8" fill="#065F46" opacity="0.6"/>

  <!-- Flash / bolt overlay (GSI flash) -->
  <path d="M36 10 L26 30 H33 L28 54 L44 28 H37 L36 10Z"
        fill="url(#boltGrad)"
        filter="url(#glow)"
        opacity="0.92"/>
  <path d="M36 10 L26 30 H33 L28 54 L44 28 H37 L36 10Z"
        fill="none"
        stroke="#FDE68A"
        stroke-width="0.6"
        stroke-linejoin="round"
        opacity="0.5"/>

  <!-- Top shine -->
  <ellipse cx="24" cy="10" rx="14" ry="5" fill="white" fill-opacity="0.08"/>
</svg>
