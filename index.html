<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <script>
      // GitHub Pages SPA routing: restore the path encoded by 404.html
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search && search.indexOf('?p=') === 0) {
          var decoded = decodeURIComponent(search.slice(3));
          history.replaceState(null, null, location.pathname.replace(/\/$/, '') + '/' + decoded);
        }
      })();
    </script>
    <title>GSI Flashing Guide</title>
    <meta name="description" content="A beginner-friendly tutorial for flashing Generic System Images (GSI) on Android devices, without bricking them. Written by Kaif." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
